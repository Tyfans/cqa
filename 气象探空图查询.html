<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>气象探空图查询</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent2: #38c9b0;
      --text: #e8ecf4;
      --text-muted: #7a8299;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    /* ---- 顶栏 ---- */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .header-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-icon svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 2; }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
    .header p { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

    /* ---- 控制面板 ---- */
    .control-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .control-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      align-items: end;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }
    .form-group input,
    .form-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }
    .form-group select option { background: var(--surface2); }

    /* 类型切换按钮组 */
    .type-group {
      display: flex;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .type-btn {
      flex: 1;
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 9px 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .type-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .type-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .type-btn:hover:not(.active) { background: var(--border); color: var(--text); }

    /* 查询按钮 */
    .btn-query {
      background: linear-gradient(135deg, var(--accent), #3a7ef0);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 10px 28px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .btn-query:hover { opacity: 0.9; }
    .btn-query:active { transform: scale(0.97); }

    /* ---- 图片展示区 ---- */
    .viewer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      min-height: 400px;
      display: flex;
      flex-direction: column;
    }
    .viewer-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .viewer-title {
      font-size: 0.88rem;
      color: var(--text-muted);
      word-break: break-all;
    }
    .viewer-title span {
      color: var(--accent);
      font-weight: 600;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-tianyan { background: rgba(79,142,247,0.18); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
    .badge-meso    { background: rgba(56,201,176,0.18); color: var(--accent2); border: 1px solid rgba(56,201,176,0.3); }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .viewer-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      min-height: 300px;
    }
    .placeholder {
      text-align: center;
      color: var(--text-muted);
    }
    .placeholder svg {
      width: 56px; height: 56px;
      stroke: var(--border);
      margin-bottom: 12px;
    }
    .placeholder p { font-size: 0.92rem; }

    /* 加载动画 */
    .loader {
      display: none;
      position: absolute;
      inset: 0;
      background: var(--surface);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 10;
    }
    .loader.show { display: flex; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader p { font-size: 0.88rem; color: var(--text-muted); }

    /* 探空图 */
    #sounding-img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      display: none;
      cursor: zoom-in;
      transition: transform 0.2s;
    }
    #sounding-img.zoomed { cursor: zoom-out; }
    #sounding-img.show { display: block; }

    /* 错误提示 */
    .error-box {
      display: none;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 14px 18px;
      color: #f87171;
      font-size: 0.9rem;
      text-align: center;
      max-width: 460px;
    }
    .error-box.show { display: block; }

    /* 底部 URL 信息 */
    .url-bar {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      word-break: break-all;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .url-bar.show { display: flex; }
    .url-bar a {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }
    .url-bar a:hover { text-decoration: underline; }

    /* ---- 快速日期按钮 ---- */
    .quick-dates {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.76rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 响应式 */
    @media (max-width: 600px) {
      .control-grid { grid-template-columns: 1fr 1fr; }
      .btn-query { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2 L12 6" stroke-linecap="round"/>
      <path d="M12 18 L12 22" stroke-linecap="round"/>
      <path d="M2 12 L6 12" stroke-linecap="round"/>
      <path d="M18 12 L22 12" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="4"/>
      <path d="M8 8 Q12 4 16 8 Q20 12 16 16 Q12 20 8 16 Q4 12 8 8" stroke-dasharray="3 2" opacity="0.5"/>
    </svg>
  </div>
  <div>
    <h1>气象探空图查询</h1>
    <p>Upper-Air Sounding Chart Viewer &nbsp;·&nbsp; 天衍版 &amp; 中涡版</p>
  </div>
</div>

<!-- 控制面板 -->
<div class="control-panel">
  <div class="control-grid">

    <!-- 日期 -->
    <div class="form-group">
      <label>日期（UTC）</label>
      <input type="date" id="date-input" />
      <div class="quick-dates">
        <button class="quick-btn" onclick="setToday()">今天</button>
        <button class="quick-btn" onclick="setYesterday()">昨天</button>
      </div>
    </div>

    <!-- UTC 时次 -->
    <div class="form-group">
      <label>UTC 时次</label>
      <select id="hour-select">
        <option value="00">00 UTC</option>
        <option value="06">06 UTC</option>
        <option value="12">12 UTC</option>
        <option value="18">18 UTC</option>
      </select>
    </div>

    <!-- 站号 -->
    <div class="form-group">
      <label>探空站号</label>
      <input type="text" id="station-input" value="59316" maxlength="6" placeholder="如 59316" />
      <div class="quick-dates">
        <button class="quick-btn" onclick="setStation('59316')">汕头</button>
        <button class="quick-btn" onclick="setStation('59280')">清远</button>
        <button class="quick-btn" onclick="setStation('45004')">香港</button>
      </div>
    </div>

    <!-- 类型 -->
    <div class="form-group">
      <label>图像类型</label>
      <div class="type-group">
        <button class="type-btn active" id="btn-tianyan" onclick="setType('tianyan')">天衍版</button>
        <button class="type-btn" id="btn-meso" onclick="setType('meso')">中涡版</button>
      </div>
    </div>

    <!-- 查询 -->
    <div class="form-group">
      <label>&nbsp;</label>
      <button class="btn-query" onclick="queryImage()">查 询</button>
    </div>

  </div>
</div>

<!-- 展示区 -->
<div class="viewer">
  <div class="viewer-header">
    <div class="viewer-title" id="viewer-label">请选择参数后点击查询</div>
    <div id="viewer-badge" class="badge badge-tianyan" style="display:none">
      <span class="badge-dot"></span>
      <span id="badge-text">天衍版</span>
    </div>
  </div>

  <div class="viewer-body">
    <!-- 加载中 -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p>正在加载探空图…</p>
    </div>

    <!-- 占位符 -->
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M3 9 h18"/>
        <path d="M9 21 V9"/>
      </svg>
      <p>探空图将显示在这里</p>
    </div>

    <!-- 图片 -->
    <img id="sounding-img" alt="探空图" />

    <!-- 错误 -->
    <div class="error-box" id="error-box">
      <strong>图像加载失败</strong><br/>
      该时次可能暂无数据，或站号有误，请尝试其他参数。
    </div>
  </div>

  <!-- URL 栏 -->
  <div class="url-bar" id="url-bar">
    <span style="white-space:nowrap">图像地址：</span>
    <a id="url-link" href="#" target="_blank"></a>
  </div>
</div>

<script>
  let currentType = 'tianyan';

  // ---- 初始化默认日期（UTC 今天）----
  (function initDate() {
    const now = new Date();
    const y = now.getUTCFullYear();
    const m = String(now.getUTCMonth() + 1).padStart(2, '0');
    const d = String(now.getUTCDate()).padStart(2, '0');
    document.getElementById('date-input').value = `${y}-${m}-${d}`;

    // 默认选最近整点时次（00/06/12/18）
    const h = now.getUTCHours();
    const validHours = [0, 6, 12, 18];
    // 找最近已过的时次
    let chosen = 0;
    for (const vh of validHours) { if (h >= vh) chosen = vh; }
    document.getElementById('hour-select').value = String(chosen).padStart(2, '0');
  })();

  function setToday() {
    const now = new Date();
    const y = now.getUTCFullYear();
    const m = String(now.getUTCMonth() + 1).padStart(2, '0');
    const d = String(now.getUTCDate()).padStart(2, '0');
    document.getElementById('date-input').value = `${y}-${m}-${d}`;
  }

  function setYesterday() {
    const now = new Date();
    now.setUTCDate(now.getUTCDate() - 1);
    const y = now.getUTCFullYear();
    const m = String(now.getUTCMonth() + 1).padStart(2, '0');
    const d = String(now.getUTCDate()).padStart(2, '0');
    document.getElementById('date-input').value = `${y}-${m}-${d}`;
  }

  function setStation(code) {
    document.getElementById('station-input').value = code;
  }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-tianyan').classList.toggle('active', t === 'tianyan');
    document.getElementById('btn-meso').classList.toggle('active', t === 'meso');
  }

  function buildUrl(dateStr, hour, station) {
    // dateStr: "2026-03-30"
    const parts = dateStr.split('-');
    const year = parts[0];           // "2026"
    const yyyymmdd = parts.join(''); // "20260330"

    if (currentType === 'tianyan') {
      // https://observation.80php.com/outsideapi/tianyan/radar3/data/product/tianyan/UPAR/TLOGP/59316/2026/20260330/TLOGP_59316_20260330_000000.png
      const hhmmss = `${hour}0000`;
      return `https://observation.80php.com/outsideapi/tianyan/radar3/data/product/tianyan/UPAR/TLOGP/${station}/${year}/${yyyymmdd}/TLOGP_${station}_${yyyymmdd}_${hhmmss}.png`;
    } else {
      // https://mesovortices.com/media/sounding/SKEWT_20260330000000_59316.png
      const datetime = `${yyyymmdd}${hour}0000`;
      return `https://mesovortices.com/media/sounding/SKEWT_${datetime}_${station}.png`;
    }
  }

  function queryImage() {
    const dateVal = document.getElementById('date-input').value;
    const hour    = document.getElementById('hour-select').value;
    const station = document.getElementById('station-input').value.trim();

    if (!dateVal) { alert('请选择日期'); return; }
    if (!station) { alert('请输入探空站号'); return; }

    const url = buildUrl(dateVal, hour, station);
    loadImage(url, dateVal, hour, station);
  }

  function loadImage(url, dateVal, hour, station) {
    const loader      = document.getElementById('loader');
    const placeholder = document.getElementById('placeholder');
    const imgEl       = document.getElementById('sounding-img');
    const errorBox    = document.getElementById('error-box');
    const urlBar      = document.getElementById('url-bar');
    const urlLink     = document.getElementById('url-link');
    const label       = document.getElementById('viewer-label');
    const badge       = document.getElementById('viewer-badge');
    const badgeText   = document.getElementById('badge-text');

    // 重置状态
    placeholder.style.display = 'none';
    imgEl.classList.remove('show');
    errorBox.classList.remove('show');
    urlBar.classList.remove('show');
    loader.classList.add('show');

    // 更新 badge
    badge.style.display = '';
    if (currentType === 'tianyan') {
      badge.className = 'badge badge-tianyan';
      badgeText.textContent = '天衍版';
    } else {
      badge.className = 'badge badge-meso';
      badgeText.textContent = '中涡版';
    }

    // 更新标题
    const typeName = currentType === 'tianyan' ? '天衍版' : '中涡版';
    label.innerHTML = `<span>${station}</span> 站 · ${dateVal} <span>${hour}:00 UTC</span> · ${typeName}`;

    // 用新 Image 对象预加载（绕过缓存验证）
    const tempImg = new Image();
    tempImg.onload = function() {
      loader.classList.remove('show');
      imgEl.src = url;
      imgEl.classList.add('show');
      urlBar.classList.add('show');
      urlLink.href = url;
      urlLink.textContent = url;
    };
    tempImg.onerror = function() {
      loader.classList.remove('show');
      errorBox.classList.add('show');
      urlBar.classList.add('show');
      urlLink.href = url;
      urlLink.textContent = url;
      label.innerHTML = `<span>${station}</span> 站 · ${dateVal} <span>${hour}:00 UTC</span> · ${typeName} &nbsp;<span style="color:#f87171">（加载失败）</span>`;
    };
    // 加随机参数防止浏览器缓存旧的 404
    tempImg.src = url + '?t=' + Date.now();
  }

  // 回车快捷查询
  document.getElementById('station-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') queryImage();
  });

  // 图片点击放大
  const imgEl = document.getElementById('sounding-img');
  let zoomed = false;
  imgEl.addEventListener('click', function() {
    if (!zoomed) {
      imgEl.style.maxWidth = 'none';
      imgEl.style.maxHeight = 'none';
      imgEl.classList.add('zoomed');
      zoomed = true;
    } else {
      imgEl.style.maxWidth = '100%';
      imgEl.style.maxHeight = '70vh';
      imgEl.classList.remove('zoomed');
      zoomed = false;
    }
  });
</script>

</body>
</html>
