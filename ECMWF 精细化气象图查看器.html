<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECMWF 气象图查看器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── 顶栏 ── */
    header {
      width: 100%;
      background: linear-gradient(135deg, #1a2035 0%, #1e3a5f 100%);
      border-bottom: 1px solid #2d4a7a;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    header .icon { font-size: 26px; }
    header h1 { font-size: 1.3rem; font-weight: 700; color: #93c5fd; }
    header p  { font-size: 0.76rem; color: #64748b; margin-top: 2px; }

    /* ── 分组区域 ── */
    .group-section {
      width: 100%;
      max-width: 960px;
      margin: 16px auto 0;
      padding: 12px 16px;
      background: #1a2035;
      border: 1px solid #2d4a7a;
      border-radius: 12px;
    }
    .group-title {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-left: 4px;
    }
    .type-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .type-tab {
      background: #0f1117;
      border: 1px solid #2d4a7a;
      color: #94a3b8;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .type-tab:hover { border-color: #3b82f6; color: #bfdbfe; background: #1e3a5f; }
    .type-tab.active {
      background: #1e4d8c;
      border-color: #3b82f6;
      color: #60a5fa;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
    }

    /* ── 控制区 ── */
    .controls {
      width: 100%;
      max-width: 960px;
      margin: 14px auto 0;
      background: #1a2035;
      border: 1px solid #2d4a7a;
      border-radius: 14px;
      padding: 18px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: flex-end;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-group label {
      font-size: 0.75rem; color: #94a3b8; font-weight: 600;
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    .control-group input[type="date"],
    .control-group select {
      background: #0f1117; border: 1px solid #2d4a7a; color: #e2e8f0;
      border-radius: 8px; padding: 8px 12px; font-size: 0.92rem;
      font-family: inherit; outline: none; cursor: pointer; transition: border-color 0.2s;
    }
    .control-group input[type="date"]:hover,
    .control-group select:hover { border-color: #3b82f6; }
    .control-group input[type="date"]:focus,
    .control-group select:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    .btn-go {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff; border: none; border-radius: 8px; padding: 8px 22px;
      font-size: 0.92rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; font-family: inherit; white-space: nowrap;
    }
    .btn-go:hover {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.35);
    }
    .btn-go:active { transform: translateY(0); }

    /* ── 时次信息 + 导航 ── */
    .step-bar {
      width: 100%; max-width: 960px; margin: 16px auto 0;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .step-info {
      flex: 1; background: #1a2035; border: 1px solid #2d4a7a;
      border-radius: 10px; padding: 11px 16px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }
    .step-info .label { font-size: 0.78rem; color: #64748b; }
    .step-info .value {
      font-size: 1rem; font-weight: 700; color: #60a5fa;
      font-variant-numeric: tabular-nums;
    }
    .nav-btns { display: flex; gap: 10px; }
    .btn-nav {
      background: #1e3a5f; color: #93c5fd; border: 1px solid #2d4a7a;
      border-radius: 8px; padding: 10px 20px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: inherit; user-select: none;
    }
    .btn-nav:hover:not(:disabled) {
      background: #1e4d8c; border-color: #3b82f6; color: #bfdbfe;
      transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.25);
    }
    .btn-nav:active:not(:disabled) { transform: translateY(0); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── 进度条 ── */
    .progress-row {
      width: 100%; max-width: 960px; margin: 12px auto 0;
      display: flex; gap: 3px; flex-wrap: wrap;
    }
    .progress-dot {
      flex: 1; min-width: 16px; height: 5px; background: #1e3a5f;
      border-radius: 3px; cursor: pointer; transition: background 0.15s, transform 0.12s;
    }
    .progress-dot:hover { background: #3b82f6; transform: scaleY(1.7); }
    .progress-dot.active { background: #60a5fa; }
    .progress-dot.active:hover { background: #93c5fd; }

    /* ── URL 栏 & 键盘提示 ── */
    .url-bar {
      width: 100%; max-width: 960px; margin: 6px auto 0; padding: 0 2px;
    }
    .url-bar a {
      color: #334155; font-size: 0.7rem; word-break: break-all;
      text-decoration: none; font-family: "Consolas", monospace; transition: color 0.2s;
    }
    .url-bar a:hover { color: #60a5fa; }
    .keyboard-hint {
      width: 100%; max-width: 960px; margin: 4px auto 0;
      display: flex; gap: 12px; justify-content: flex-end; padding: 0 4px;
    }
    .keyboard-hint span { font-size: 0.7rem; color: #334155; }
    .keyboard-hint kbd {
      background: #1e3a5f; border: 1px solid #2d4a7a; border-radius: 4px;
      padding: 1px 6px; font-size: 0.68rem; color: #64748b; font-family: inherit;
    }

    /* ══════════════════════════════════════════════════
       图片容器 — 核心：用 <img> 自身撑高，无绝对定位层
       ══════════════════════════════════════════════════ */
    .image-wrap {
      width: 100%;
      max-width: 960px;
      margin: 14px auto 40px;
      border: 1px solid #2d4a7a;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      background: #1a2035;
      /* 用 grid 叠放两张图，让它们共享同一个格子 */
      display: grid;
    }

    /*
      两张 img 放在同一个 grid 格子里叠放。
      front 在上，back 在下。
      通过 opacity 0→1 切换，背后始终是前一张，
      视觉上永远不会出现黑屏。
    */
    .image-wrap img {
      grid-area: 1 / 1;          /* 两张图占同一格，完全叠放 */
      width: 100%;
      height: auto;
      display: block;
      /* 不设 position:absolute，让图片撑起容器高度 */
    }

    /* front 层：始终可见 */
    .image-wrap img.front {
      opacity: 1;
      z-index: 2;
      position: relative;        /* 只有 front 参与文档流撑高 */
    }

    /* back 层：隐藏在 front 后面，加载完成后做切换 */
    .image-wrap img.back {
      opacity: 0;
      z-index: 1;
      position: absolute;        /* 不影响容器高度，随 front 撑高 */
      top: 0; left: 0;
      width: 100%; height: auto;
      /* 加上 pointer-events:none 防止误点 */
      pointer-events: none;
    }

    /* 切换动画：back 淡入变成新 front */
    .image-wrap img.fade-in {
      animation: fadeIn 0.12s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* 空状态 */
    .empty-state {
      grid-area: 1 / 1;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; padding: 70px 40px; text-align: center;
    }
    .empty-state .big-icon { font-size: 50px; opacity: 0.35; }
    .empty-state p { color: #475569; font-size: 0.92rem; }

    /* 错误提示（小角标，不遮图） */
    .err-toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(239,68,68,0.92);
      color: #fff; border-radius: 10px; padding: 10px 20px;
      font-size: 0.85rem; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 99; opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      max-width: 90%;
      text-align: center;
    }
    .err-toast.show { opacity: 1; }

    /* 加载角标（右下角） */
    .loading-badge {
      position: fixed;
      bottom: 28px; right: 28px;
      background: rgba(15,17,23,0.82);
      border: 1px solid #2d4a7a; border-radius: 20px;
      padding: 6px 14px; display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; color: #64748b;
      z-index: 98; opacity: 0; transition: opacity 0.25s;
      pointer-events: none;
    }
    .loading-badge.show { opacity: 1; }
    .mini-spinner {
      width: 13px; height: 13px;
      border: 2px solid #1e3a5f; border-top-color: #60a5fa;
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <span class="icon">🌀</span>
  <div>
    <h1>ECMWF 精细化气象图查看器</h1>
    <p>欧洲中期天气预报中心 · 多区域产品</p>
  </div>
</header>

<!-- 东亚区域 -->
<div class="group-section">
  <div class="group-title">东亚区域</div>
  <div class="type-tabs" id="eastAsiaTabs"></div>
</div>

<!-- 华南区域 -->
<div class="group-section">
  <div class="group-title">华南区域</div>
  <div class="type-tabs" id="southChinaTabs"></div>
</div>

<!-- 广东区域 -->
<div class="group-section">
  <div class="group-title">广东区域</div>
  <div class="type-tabs" id="guangdongTabs"></div>
</div>

<!-- 控制区 -->
<div class="controls">
  <div class="control-group" id="dateGroup">
    <label>起报日期（UTC）</label>
    <input type="date" id="dateInput" />
  </div>
  <div class="control-group">
    <label>起报时次（UTC）</label>
    <select id="hourSelect">
      <option value="00">00 时</option>
      <option value="06">06 时</option>
      <option value="12">12 时</option>
      <option value="18">18 时</option>
    </select>
  </div>
  <div class="control-group" id="maxStepGroup">
    <label>最大预报步长</label>
    <select id="maxStepSelect">
      <option value="120">120 h（21 张）</option>
      <option value="240" selected>240 h（41 张）</option>
      <option value="360">360 h（61 张）</option>
    </select>
  </div>
  <button class="btn-go" onclick="loadSeries()">▶ 加载</button>
</div>

<!-- 时次信息 + 导航 -->
<div class="step-bar" id="stepBar" style="display:none;">
  <div class="step-info">
    <div><div class="label">预报步长</div><div class="value" id="stepValue">—</div></div>
    <div><div class="label">对应 UTC 时间</div><div class="value" id="validTime">—</div></div>
    <div><div class="label">序号</div><div class="value" id="stepIndex">—</div></div>
  </div>
  <div class="nav-btns">
    <button class="btn-nav" id="btnPrev" onclick="navigate(-1)">◀ 上一张</button>
    <button class="btn-nav" id="btnNext" onclick="navigate(1)">下一张 ▶</button>
  </div>
</div>

<!-- 进度点 -->
<div class="progress-row" id="progressRow"></div>

<!-- URL 栏 -->
<div class="url-bar" id="urlBar" style="display:none;">
  <a href="#" id="urlLink" target="_blank" title="新标签打开原图"></a>
</div>

<!-- 键盘提示 -->
<div class="keyboard-hint">
  <span><kbd>←</kbd> 上一张</span>
  <span><kbd>→</kbd> 下一张</span>
</div>

<!-- 图片区域 -->
<div class="image-wrap" id="imageWrap">
  <div class="empty-state" id="emptyState">
    <div class="big-icon">🗺️</div>
    <p>请选择图片类型、日期和起报时次，然后点击「加载」</p>
  </div>
</div>

<!-- 加载角标 -->
<div class="loading-badge" id="loadingBadge">
  <div class="mini-spinner"></div><span>加载中…</span>
</div>

<!-- 错误 toast -->
<div class="err-toast" id="errToast"></div>

<script>
// ═══════════════════════════════════════════════════
//  图片类型配置
// ═══════════════════════════════════════════════════

// 东亚区域 - 需要完整日期
const EAST_ASIA_TYPES = [
  { id: 'wind850hght500',           label: '850风+500高度', fileKey: 'cn_wind850hght500',           startStep: 0 },
  { id: 'rhum850',                  label: '850湿度',       fileKey: 'cn_rhum850',                  startStep: 0 },
  { id: 'wind925',                  label: '925风',         fileKey: 'cn_wind925',                  startStep: 0 },
  { id: 'vflux925',                 label: '925水汽',       fileKey: 'cn_vflux925',                 startStep: 0 },
  { id: 'wind200stream200hght200',  label: '200流线',       fileKey: 'cn_wind200stream200hght200',  startStep: 0 },
  { id: 'wind500hght500temp500',    label: '500风温高',     fileKey: 'cn_wind500hght500temp500',    startStep: 0 },
  { id: 'wind10mslp',               label: '10m风',         fileKey: 'cn_wind10mslp',               startStep: 0 },
  { id: 't2mm',                     label: '2m温度',        fileKey: 'cn_t2mm',                     startStep: 0 },
  { id: 'mslp',                     label: 'MSLP',          fileKey: 'cn_mslp',                     startStep: 0 },
];

// 华南区域 - CAPE和6h降水需要日期，其他不需要
const SOUTH_CHINA_TYPES = [
  { id: 'hn_cape',        label: 'CAPE',        fileKey: 'hn_cape',     startStep: 0,  urlType: 'ecmwffine', needsDate: true },
  { id: 'hn_rain6',       label: '6h降水',      fileKey: 'hn_rain6',    startStep: 6,  urlType: 'grapes9km', needsDate: true, stepInterval: 6 },
  { id: 'hn_mslp',        label: '海平面气压',  region: 'hn', fileKey: 'mslp',        startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_hghtwind500', label: '500高度(副高)', region: 'hn', fileKey: 'hghtwind500', startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_wind850hght500', label: '850风',    region: 'hn', fileKey: 'wind850hght500', startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_t2mm_max',    label: '最高温',      region: 'hn', fileKey: 't2mm-max',    startStep: 24, needsDate: false },
  { id: 'hn_t2mm_min',    label: '最低温',      region: 'hn', fileKey: 't2mm-min',    startStep: 24, needsDate: false },
  { id: 'hn_t2mm',        label: '2m温度',      region: 'hn', fileKey: 't2mm',        startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_wind10m',     label: '10m风',       region: 'hn', fileKey: 'wind10m',     startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_wind200',     label: '200风',       region: 'hn', fileKey: 'wind200',     startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_wind700',     label: '700风',       region: 'hn', fileKey: 'wind700',     startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_temp925wind925', label: '925风温', region: 'hn', fileKey: 'temp925wind925', startStep: 0, needsDate: false, stepInterval: 24 },
  { id: 'hn_rhum500',     label: '500湿度',     region: 'hn', fileKey: 'rhum500',     startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_rhum700',     label: '700湿度',     region: 'hn', fileKey: 'rhum700',     startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_rhum850',     label: '850湿度',     region: 'hn', fileKey: 'rhum850',     startStep: 0,  needsDate: false, stepInterval: 24 },
  { id: 'hn_rhum925',     label: '925湿度',     region: 'hn', fileKey: 'rhum925',     startStep: 0,  needsDate: false, stepInterval: 24 },
];

// 广东区域 - 不需要日期，只需要时次，支持240小时
const GUANGDONG_TYPES = [
  { id: 'gd_tcdc',        label: '总云量',      region: 'gd', fileKey: 'tcdc',        startStep: 24, needsDate: false, maxStep: 240 },
  { id: 'gd_td',          label: '温度露点差',  region: 'gd', fileKey: 'td', fileNameKey: 't-td-surf', startStep: 24, needsDate: false, maxStep: 240 },
  { id: 'gd_wind10m',     label: '10m风',       region: 'gd', fileKey: 'wind10m',     startStep: 24, needsDate: false, maxStep: 240 },
];

// 所有类型合并
const ALL_TYPES = [...EAST_ASIA_TYPES, ...SOUTH_CHINA_TYPES, ...GUANGDONG_TYPES];

// ═══════════════════════════════════════════════════
//  状态
// ═══════════════════════════════════════════════════
let steps      = [];
let currentIdx = 0;
let dateStr    = '';
let activeType = EAST_ASIA_TYPES[0];

/*
  双缓冲实现原理（无 position:absolute 叠层方案）：
  ─────────────────────────────────────────────────
  imageWrap 使用 CSS Grid，两张 <img> 都放在 grid-area: 1/1，
  形成叠放。front 始终 opacity:1 且 position:relative（撑高容器），
  back 始终 opacity:0 且 position:absolute（不占空间）。

  切换流程：
  1. 把新 URL 赋给 back
  2. back.onload 触发后：
     a. back.classList → 'front fade-in'（淡入）
     b. 旧 front.classList → 'back'（沉底，隐藏）
  3. 切换完毕，front/back 引用互换

  关键：front 在整个加载过程中一直显示旧图，没有任何黑屏帧。
*/
let imgFront = null;   // 当前可见的 img 元素
let imgBack  = null;   // 后台预加载的 img 元素
let loadSerial = 0;    // 防止乱序响应

// ═══════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════
function pad(n, len = 2) { return String(n).padStart(len, '0'); }

function buildUrl(dateHH, stepH) {
  // 需要完整日期的类型（东亚区域 + 华南区域的CAPE和6h降水）
  if (!activeType.region || activeType.needsDate === true) {
    // 特殊处理不同URL类型
    if (activeType.urlType === 'grapes9km') {
      // 6h降水使用grapes9km路径
      return `https://www.gdfltq.com/nwp/grapes9km/${dateHH}/grapes9_${activeType.fileKey}_${pad(stepH,3)}_${dateHH}.png`;
    }
    // 默认使用ecmwffine路径（包括CAPE）
    return `https://www.gdfltq.com/nwp/ecmwffine/${dateHH}/ecmwffine_${activeType.fileKey}_${pad(stepH,3)}_${dateHH}.png`;
  }
  // 华南区域和广东区域（不需要日期）使用新的URL格式
  // 只需要时次（00或12），不需要完整日期
  const hour = dateHH.slice(-2); // 提取时次
  // 如果有fileNameKey，使用它作为文件名中的key；否则使用fileKey
  const fileNameKey = activeType.fileNameKey || activeType.fileKey;
  return `https://gd12121.com/wb/getfile/date/ecmwf_fine/${activeType.region}/${activeType.fileKey}/ecmwffine_${activeType.region}_${fileNameKey}_${pad(stepH,3)}_${hour}.png`;
}

function parseDate(dateHH) {
  return new Date(Date.UTC(+dateHH.slice(0,4), +dateHH.slice(4,6)-1, +dateHH.slice(6,8), +dateHH.slice(8,10)));
}

function formatValidTime(base, stepH) {
  const t = new Date(base.getTime() + stepH * 3600000);
  return `${t.getUTCFullYear()}-${pad(t.getUTCMonth()+1)}-${pad(t.getUTCDate())} ${pad(t.getUTCHours())}:00 UTC`;
}

// ═══════════════════════════════════════════════════
//  类型标签构建
// ═══════════════════════════════════════════════════
function buildTypeTabs() {
  // 东亚区域
  const eastAsiaWrap = document.getElementById('eastAsiaTabs');
  eastAsiaWrap.innerHTML = '';
  EAST_ASIA_TYPES.forEach((type, i) => {
    const btn = document.createElement('button');
    btn.className = 'type-tab' + (i === 0 ? ' active' : '');
    btn.textContent = type.label;
    btn.addEventListener('click', () => {
      if (type.id === activeType.id) return;
      activeType = type;
      updateActiveTab();
      updateControlsVisibility();
      if (steps.length) { rebuildSteps(); renderImage(); }
    });
    eastAsiaWrap.appendChild(btn);
  });

  // 华南区域
  const southChinaWrap = document.getElementById('southChinaTabs');
  southChinaWrap.innerHTML = '';
  SOUTH_CHINA_TYPES.forEach((type) => {
    const btn = document.createElement('button');
    btn.className = 'type-tab';
    btn.textContent = type.label;
    btn.addEventListener('click', () => {
      if (type.id === activeType.id) return;
      activeType = type;
      updateActiveTab();
      updateControlsVisibility();
      if (steps.length) { rebuildSteps(); renderImage(); }
    });
    southChinaWrap.appendChild(btn);
  });

  // 广东区域
  const guangdongWrap = document.getElementById('guangdongTabs');
  guangdongWrap.innerHTML = '';
  GUANGDONG_TYPES.forEach((type) => {
    const btn = document.createElement('button');
    btn.className = 'type-tab';
    btn.textContent = type.label;
    btn.addEventListener('click', () => {
      if (type.id === activeType.id) return;
      activeType = type;
      updateActiveTab();
      updateControlsVisibility();
      if (steps.length) { rebuildSteps(); renderImage(); }
    });
    guangdongWrap.appendChild(btn);
  });
}

function updateActiveTab() {
  document.querySelectorAll('.type-tab').forEach(btn => {
    btn.classList.remove('active');
  });
  
  // 找到对应的按钮并激活
  const allTabs = document.querySelectorAll('.type-tab');
  allTabs.forEach(btn => {
    if (btn.textContent === activeType.label) {
      btn.classList.add('active');
    }
  });
}

function updateControlsVisibility() {
  const dateGroup = document.getElementById('dateGroup');
  const maxStepGroup = document.getElementById('maxStepGroup');
  
  // 如果需要日期，显示日期选择；否则隐藏
  if (activeType.needsDate === false) {
    dateGroup.style.display = 'none';
  } else {
    dateGroup.style.display = 'flex';
  }
  
  // 如果类型有自定义maxStep，隐藏最大预报步长选择；否则显示
  if (activeType.maxStep) {
    maxStepGroup.style.display = 'none';
  } else {
    maxStepGroup.style.display = 'flex';
  }
}

// ═══════════════════════════════════════════════════
//  步长重建
// ═══════════════════════════════════════════════════
function rebuildSteps() {
  // 如果类型有自定义maxStep，使用它；否则使用下拉框的值
  const maxStep = activeType.maxStep || parseInt(document.getElementById('maxStepSelect').value);
  // 如果类型有自定义stepInterval，使用它；否则根据startStep判断（0用6，其他用24）
  const stepInterval = activeType.stepInterval || (activeType.startStep === 0 ? 6 : 24);
  
  steps = [];
  for (let s = activeType.startStep; s <= maxStep; s += stepInterval) {
    steps.push(s);
  }
  if (currentIdx >= steps.length) currentIdx = 0;
  buildProgressDots();
}

// ═══════════════════════════════════════════════════
//  加载系列
// ═══════════════════════════════════════════════════
function loadSeries() {
  const dateVal = document.getElementById('dateInput').value;
  const hour    = document.getElementById('hourSelect').value;
  
  // 东亚区域需要日期
  if (activeType.needsDate !== false && !dateVal) { 
    alert('请先选择日期！'); 
    return; 
  }

  if (activeType.needsDate === false) {
    // 华南和广东区域只需要时次
    dateStr = '20240101' + hour; // 使用一个默认日期，实际URL中只使用时次
  } else {
    dateStr = dateVal.replace(/-/g, '') + hour;
  }
  
  currentIdx = 0;
  rebuildSteps();

  document.getElementById('stepBar').style.display = 'flex';
  document.getElementById('urlBar').style.display  = 'block';

  renderImage();
}

// ═══════════════════════════════════════════════════
//  进度点
// ═══════════════════════════════════════════════════
function buildProgressDots() {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  steps.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i === currentIdx ? ' active' : '');
    dot.title = `+${pad(s,3)}h`;
    dot.addEventListener('click', () => { currentIdx = i; renderImage(); });
    row.appendChild(dot);
  });
}

function updateProgressDots() {
  document.querySelectorAll('.progress-dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentIdx);
  });
}

// ═══════════════════════════════════════════════════
//  双缓冲初始化（只调用一次）
// ═══════════════════════════════════════════════════
function initImageLayers() {
  const wrap = document.getElementById('imageWrap');

  // 移除空状态占位
  const empty = document.getElementById('emptyState');
  if (empty) empty.remove();

  if (imgFront) return; // 已初始化

  // 创建两张 img
  imgFront = document.createElement('img');
  imgFront.className = 'front';
  imgFront.alt = '';

  imgBack = document.createElement('img');
  imgBack.className = 'back';
  imgBack.alt = '';

  wrap.appendChild(imgFront);
  wrap.appendChild(imgBack);
}

// ═══════════════════════════════════════════════════
//  渲染（双缓冲核心）
// ═══════════════════════════════════════════════════
function renderImage() {
  if (!steps.length) return;

  const stepH  = steps[currentIdx];
  const url    = buildUrl(dateStr, stepH);
  const serial = ++loadSerial;

  // ── 更新信息栏 ──
  const base = parseDate(dateStr);
  document.getElementById('stepValue').textContent = `+${pad(stepH,3)} h`;
  document.getElementById('validTime').textContent  = formatValidTime(base, stepH);
  document.getElementById('stepIndex').textContent  = `${currentIdx+1} / ${steps.length}`;

  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').disabled = currentIdx === steps.length - 1;
  updateProgressDots();

  const link = document.getElementById('urlLink');
  link.href = url; link.textContent = url;

  // ── 初始化图层（首次） ──
  initImageLayers();

  // ── 如果 front 还没有图（首帧），直接加载到 front ──
  if (!imgFront.src || imgFront.src === window.location.href) {
    showBadge(true);
    imgFront.onload  = () => { if (serial === loadSerial) showBadge(false); };
    imgFront.onerror = () => { if (serial === loadSerial) { showBadge(false); showErr('图片加载失败，该时次可能暂未发布'); } };
    imgFront.src = url;
    return;
  }

  // ── 后续帧：加载到 back，完成后无缝切换 ──
  showBadge(true);

  // 清除旧的回调，防止旧请求触发
  imgBack.onload  = null;
  imgBack.onerror = null;
  // 清空 src，确保相同 URL 也能重新触发 onload（重要！）
  imgBack.src = '';

  imgBack.onload = () => {
    if (serial !== loadSerial) return; // 已被更新请求取代，丢弃

    // 把 back 变成 front（加淡入动画）
    imgBack.className = 'front fade-in';
    imgFront.className = 'back';

    // 动画结束后移除 fade-in class
    imgBack.addEventListener('animationend', () => {
      imgBack.classList.remove('fade-in');
    }, { once: true });

    // 互换引用
    [imgFront, imgBack] = [imgBack, imgFront];

    showBadge(false);
  };

  imgBack.onerror = () => {
    if (serial !== loadSerial) return;
    showBadge(false);
    showErr('图片加载失败，该时次可能暂未发布');
  };

  imgBack.src = url;
}

// ═══════════════════════════════════════════════════
//  加载角标 & 错误 Toast
// ═══════════════════════════════════════════════════
let badgeTimer = null;
function showBadge(on) {
  const el = document.getElementById('loadingBadge');
  clearTimeout(badgeTimer);
  if (on) {
    el.classList.add('show');
  } else {
    // 稍微延迟隐藏，避免快速响应时闪烁
    badgeTimer = setTimeout(() => el.classList.remove('show'), 200);
  }
}

let toastTimer = null;
function showErr(msg) {
  const el = document.getElementById('errToast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

// ═══════════════════════════════════════════════════
//  键盘导航
// ═══════════════════════════════════════════════════
function navigate(dir) {
  const next = currentIdx + dir;
  if (next < 0 || next >= steps.length) return;
  currentIdx = next;
  renderImage();
}

document.addEventListener('keydown', e => {
  if (!steps.length) return;
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

// ═══════════════════════════════════════════════════
//  初始化
// ═══════════════════════════════════════════════════
(function init() {
  const now = new Date();
  document.getElementById('dateInput').value =
    `${now.getUTCFullYear()}-${pad(now.getUTCMonth()+1)}-${pad(now.getUTCDate())}`;
  buildTypeTabs();
  updateControlsVisibility();
})();
</script>
